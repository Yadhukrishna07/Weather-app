<div class="weather-container">
  <h1>Weather App</h1>

  <div class="search-box">
    <input
      type="text"
      [(ngModel)]="cityName"
      (keyup.enter)="searchWeather()"
      placeholder="Enter city name..."
    />
    <button (click)="searchWeather()">Search</button>
  </div>

  @if (isLoading) {
    <p class="status-message">Loading...</p>
  }

  @if (errorMessage) {
    <p class="status-message error">{{ errorMessage }}</p>
  }

  @if (weather) {
    <div class="weather-card">
      <h2>{{ weather.cityName }}, {{ weather.country }}</h2>
      <p class="temperature">{{ weather.temperature }}°C</p>
      <p class="description">{{ weather.description }}</p>
      <p>Wind speed: {{ weather.windSpeed }} km/h</p>
    </div>
  }
</div>
